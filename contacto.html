<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizar Web | Contacto</title>
    <meta name="description" content="Contáctanos para tu próximo proyecto digital.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="preloader"><div class="loader-container"><div class="loader-ring ring-one"></div><div class="loader-ring ring-two"></div><div class="loader-core"></div></div><div class="loader-text-container"><span class="loader-text" data-final="CONTACTO">CARGANDO</span><div class="loader-bar"><div class="bar-fill"></div></div></div></div>

    <div id="background-layer" class="bg-gradient-contact"></div>
    <canvas id="starfield"></canvas>

    <header class="main-header">
        <div class="logo-container">
            <div class="star-wrapper"><div class="binary-star-icon"><div class="star s1"></div><div class="star s2"></div></div></div>
            <span class="logo-text">MIZAR WEB</span>
        </div>
        <nav class="desktop-nav">
            <a href="index.html" class="nav-btn">Inicio</a>
            <a href="nosotros.html" class="nav-btn">Nosotros</a>
            <a href="servicios.html" class="nav-btn">Servicios</a>
            <a href="proyectos.html" class="nav-btn">Proyectos</a>
            <a href="contacto.html" class="nav-btn active">Contacto</a>
        </nav>
        <button class="menu-toggle" aria-label="Abrir menú"><span class="bar b1"></span><span class="bar b2"></span><span class="bar b3"></span></button>
    </header>

    <div class="mobile-menu-overlay">
        <nav class="mobile-nav">
            <a href="index.html" class="mob-nav-btn">Inicio</a>
            <a href="nosotros.html" class="mob-nav-btn">Nosotros</a>
            <a href="servicios.html" class="mob-nav-btn">Servicios</a>
            <a href="proyectos.html" class="mob-nav-btn">Proyectos</a>
            <a href="contacto.html" class="mob-nav-btn">Contacto</a>
        </nav>
    </div>

    <main id="main-content">
        <section class="section">
            <div class="content-wrapper split-layout">
                <div class="contact-info-col">
                    <h2 class="section-title">Hablemos</h2>
                    <p>Estamos listos para hacer realidad tu proyecto. Cuéntanos qué necesitas.</p>
                    
                    <div class="contact-methods">
                        <div class="method glass-panel">
                            <i class="fas fa-envelope"></i>
                            <span>contacto@mizarweb.com.ar</span>
                        </div>
                        <div class="method glass-panel">
                            <i class="fab fa-whatsapp"></i>
                            <span>+54 3751 340173</span>
                        </div>
                        <div class="method glass-panel">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>Posadas, Misiones, Arg.</span>
                        </div>
                    </div>
                </div>

                <div class="contact-form-col">
                    <form class="glass-form">
                        <div class="form-group">
                            <input type="text" required placeholder=" ">
                            <label>Nombre</label>
                        </div>
                        <div class="form-group">
                            <input type="email" required placeholder=" ">
                            <label>Email</label>
                        </div>
                        <div class="form-group">
                            <select>
                                <option value="" disabled selected>Tipo de Servicio</option>
                                <option value="web">Desarrollo Web</option>
                                <option value="ia">Inteligencia Artificial</option>
                                <option value="design">Diseño Gráfico</option>
                                <option value="other">Otro</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <textarea required placeholder=" "></textarea>
                            <label>Mensaje</label>
                        </div>
                        <button type="submit" class="btn-primary full-width">Enviar Mensaje</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
